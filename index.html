<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus, Darling</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-blair">
<h1 id="site-title">Focus, Darling</h1>
  <div id="layout">

    <!-- 왼쪽: 타이머 -->
    <div id="app">
      <div id="character-select">
        <button class="char-btn" id="btn-rory" onclick="selectCharacter('rory')">Rory</button>
        <button class="char-btn active" id="btn-blair" onclick="selectCharacter('blair')">Blair</button>
        <button class="char-btn" id="btn-hermione" onclick="selectCharacter('hermione')">Hermione</button>
      </div>
      <p id="character-quote"></p>
      <div id="timer-display">25:00</div>
      <p id="session-label">집중 세션 (25분)</p>
      <div id="timer-buttons">
        <button class="timer-btn" onclick="startTimer()">Start</button>
        <button class="timer-btn" onclick="pauseTimer()">Pause</button>
        <button class="timer-btn" onclick="resetTimer()">Reset</button>
      </div>
      <p id="session-count">완료한 세션: 0</p>
    </div>

    <!-- 오른쪽 위: 무드보드 -->
    <div id="moodboard">
      <div id="moodboard-header">
        <p id="moodboard-title">✨ Mood Board</p>
        <div id="moodboard-actions">
          <button class="timer-btn upload-btn" onclick="openModal()">+ 이미지 추가</button>
          <button class="timer-btn" onclick="clearMoodboard()">전체 삭제</button>
        </div>
      </div>
      <div id="image-grid"></div>
    </div>

    <!-- 오른쪽 아래: 플레이리스트 -->
    <div id="music-section">
      <p id="music-label">🎵 Playlist</p>
      <div id="music-input-row">
        <input type="text" id="music-url-input" placeholder="YouTube 링크를 붙여넣으세요"/>
        <button class="timer-btn" onclick="loadMusic()">재생</button>
        <button class="timer-btn" onclick="stopMusic()">정지</button>
      </div>
      <div id="youtube-container">
        <iframe id="youtube-player" width="100%" height="200" src=""
          title="Background Music" frameborder="0"
          allow="autoplay; encrypted-media" allowfullscreen>
        </iframe>
      </div>
    </div>

  </div>

  <!-- 이미지 추가 모달 -->
  <div id="modal-overlay" onclick="closeModal()">
    <div id="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">이미지 추가</h3>
      <div id="drop-zone"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)"
        onclick="document.getElementById('image-upload').click()">
        <p>📁</p>
        <p>여기에 드래그하거나<br>클릭해서 파일 선택</p>
        <input type="file" id="image-upload" accept="image/*" multiple style="display:none" onchange="uploadImages(event)">
      </div>
      <p id="modal-or">또는 이미지 URL 붙여넣기</p>
      <div id="url-input-row">
        <input type="text" id="image-url-input" placeholder="https://example.com/image.jpg"/>
        <button class="timer-btn" onclick="addImageByUrl()">추가</button>
      </div>
      <button id="modal-close-btn" class="timer-btn" onclick="closeModal()">닫기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
